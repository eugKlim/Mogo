    <script type="text/javascript">
      let pathSegmentsToKeep = 1;

      let l = window.location;
      let newPath = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + 
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/home/' +
        l.pathname.split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash;

      l.replace(newPath);
    </script>
